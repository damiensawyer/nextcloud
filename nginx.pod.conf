# nginx config for the PODMAN POD version.
#
# Inside a pod every container shares one network namespace, so services talk
# to each other over 127.0.0.1 (NOT by container name like the compose file).
# nginx keeps :80; Nextcloud's Apache is moved to :8080 to avoid the clash.
server {
    listen 80;
    server_name cloud.test;

    client_max_body_size 512M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name collabora.test;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:9980;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}
