# nginx config for the PODMAN POD version.
#
# Inside a pod every container shares one network namespace, so services talk
# to each other over 127.0.0.1 (NOT by container name like the compose file).
# nginx listens on :8080 (the published host port); Nextcloud's Apache is moved to
# :8081 to avoid the clash. Using :8080 everywhere (host, nginx, WOPI URLs) keeps a
# single URL valid both from the browser and from inside the pod.
server {
    listen 8080;
    server_name cloud.test;

    client_max_body_size 512M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }
}

server {
    listen 8080;
    server_name collabora.test;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:9980;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}
