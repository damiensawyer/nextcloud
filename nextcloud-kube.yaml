# Podman "play kube" manifest — equivalent of docker-compose.yaml / pod.sh.
#
#   podman play kube nextcloud-kube.yaml        # start
#   podman play kube --down nextcloud-kube.yaml # stop + remove
#
# Served on http://cloud.test:8080 (see README.md). All three containers live in
# ONE pod and therefore share a single network namespace (localhost). Consequences:
#   * nginx listens on :8080 (published to the host); Nextcloud's Apache is moved
#     to :8081 (see the sed in the nextcloud container) so the two don't clash.
#     Using :8080 everywhere (host, nginx, WOPI URLs) keeps one URL valid from the
#     browser AND from inside the pod — the invariant Collabora discovery needs.
#   * Services reach each other on 127.0.0.1 instead of by container name.
#   * The compose "network aliases" trick is replaced by hostAliases, which write
#     cloud.test / collabora.test -> 127.0.0.1 into every /etc/hosts.
#     (.test is safe here; *.localhost would be hardcoded to 127.0.0.1 by glibc
#     and ignore /etc/hosts — see README.md.)
#   * The nextcloud container auto-installs (SQLite) with an admin from the env
#     vars, and the office-hook ConfigMap wires up Collabora Office on first boot.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
data:
  default.conf: |
    server {
        listen 8080;
        server_name cloud.test;

        client_max_body_size 512M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
        }
    }

    server {
        listen 8080;
        server_name collabora.test;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        location / {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }
---
# Mirrors hooks/before-starting/office.sh — auto-installs & configures Nextcloud
# Office (richdocuments). Runs as www-data on every boot; must always exit 0.
apiVersion: v1
kind: ConfigMap
metadata:
  name: office-hook
data:
  office.sh: |
    #!/bin/sh
    OFFICE_URL="${OFFICE_URL:-http://collabora.test:8080}"
    occ="php /var/www/html/occ"
    $occ status 2>/dev/null | grep -q "installed: true" || exit 0
    if ! $occ app:list 2>/dev/null | grep -q richdocuments; then
        echo "office-hook: installing richdocuments (Nextcloud Office)..."
        $occ app:install richdocuments 2>/dev/null \
            || echo "office-hook: could not install richdocuments (app store unreachable?) — will retry next boot."
    fi
    if $occ app:list 2>/dev/null | grep -q richdocuments; then
        $occ config:app:set richdocuments wopi_url        --value="$OFFICE_URL" 2>/dev/null || true
        $occ config:app:set richdocuments public_wopi_url --value="$OFFICE_URL" 2>/dev/null || true
        $occ config:app:delete richdocuments wopi_allowlist 2>/dev/null || true
        echo "office-hook: richdocuments pointed at ${OFFICE_URL}"
    fi
    exit 0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nextcloud
  labels:
    app: nextcloud
spec:
  hostAliases:
    - ip: "127.0.0.1"
      hostnames:
        - cloud.test
        - collabora.test
  dnsConfig:
    nameservers:
      - "8.8.8.8"
      - "1.1.1.1"
  containers:
    - name: collabora
      image: docker.io/collabora/code:latest
      env:
        - name: aliasgroup1
          value: "http://cloud.test:8080"
        - name: extra_params
          value: "--o:ssl.enable=false --o:ssl.termination=false"
      securityContext:
        capabilities:
          add:
            - SYS_ADMIN
            - MKNOD

    - name: nextcloud
      image: docker.io/library/nextcloud:latest
      env:
        # Unattended first-boot install (SQLite) + admin, so there is no wizard.
        # SQLITE_DATABASE is REQUIRED to auto-select SQLite on Nextcloud 30+.
        - name: SQLITE_DATABASE
          value: "nextcloud"
        - name: NEXTCLOUD_ADMIN_USER
          value: "admin"
        - name: NEXTCLOUD_ADMIN_PASSWORD
          value: "admin"
        - name: NEXTCLOUD_TRUSTED_DOMAINS
          value: "cloud.test:8080 cloud.test"
        - name: OVERWRITEHOST
          value: "cloud.test:8080"
        - name: OVERWRITEPROTOCOL
          value: "http"
        - name: OVERWRITECLIURL
          value: "http://cloud.test:8080"
        - name: OFFICE_URL
          value: "http://collabora.test:8080"
      # Move Apache from :80 to :8081 (nginx owns :8080 in the shared pod netns),
      # then hand off to the stock entrypoint. The sed is idempotent, so it is
      # safe across container restarts.
      command: ["/bin/sh", "-c"]
      args:
        - |
          sed -i 's/^Listen 80$/Listen 8081/' /etc/apache2/ports.conf
          sed -i 's/:80>/:8081>/' /etc/apache2/sites-enabled/000-default.conf
          exec /entrypoint.sh apache2-foreground
      volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/html
        - name: office-hook
          mountPath: /docker-entrypoint-hooks.d/before-starting

    - name: nginx
      image: docker.io/library/nginx:alpine
      ports:
        - containerPort: 8080
          hostPort: 8080
      volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true

  volumes:
    - name: nextcloud-data
      persistentVolumeClaim:
        claimName: nextcloud-data
    - name: nginx-conf
      configMap:
        name: nginx-conf
    - name: office-hook
      configMap:
        name: office-hook
        defaultMode: 0755
