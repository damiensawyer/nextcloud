# Podman "play kube" manifest — equivalent of docker-compose.yaml.
#
#   podman play kube nextcloud-kube.yaml       # start
#   podman play kube --down nextcloud-kube.yaml # stop + remove
#
# All three containers live in ONE pod and therefore share a single network
# namespace (localhost). Consequences vs. the compose setup:
#   * nginx keeps :80; Nextcloud's Apache is moved to :8080 (see the sed in the
#     nextcloud container) so the two don't fight over :80.
#   * Services reach each other on 127.0.0.1 instead of by container name.
#   * The compose "network aliases" trick is replaced by hostAliases, which
#     write cloud.test / collabora.test -> 127.0.0.1 into every /etc/hosts.
#     (.test is safe here; *.localhost would be hardcoded to 127.0.0.1 by glibc
#     and ignore /etc/hosts — see notes.md.)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
data:
  default.conf: |
    server {
        listen 80;
        server_name cloud.test;

        client_max_body_size 512M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
        }
    }

    server {
        listen 80;
        server_name collabora.test;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        location / {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nextcloud
  labels:
    app: nextcloud
spec:
  hostAliases:
    - ip: "127.0.0.1"
      hostnames:
        - cloud.test
        - collabora.test
  dnsConfig:
    nameservers:
      - "8.8.8.8"
      - "1.1.1.1"
  containers:
    - name: collabora
      image: docker.io/collabora/code:latest
      env:
        - name: aliasgroup1
          value: "http://cloud.test"
        - name: extra_params
          value: "--o:ssl.enable=false --o:ssl.termination=false"
      securityContext:
        capabilities:
          add:
            - SYS_ADMIN
            - MKNOD

    - name: nextcloud
      image: docker.io/library/nextcloud:latest
      # Move Apache from :80 to :8080 (nginx owns :80 in the shared pod netns),
      # then hand off to the stock entrypoint. The sed is idempotent, so it is
      # safe across container restarts.
      command: ["/bin/sh", "-c"]
      args:
        - |
          sed -i 's/^Listen 80$/Listen 8080/' /etc/apache2/ports.conf
          sed -i 's/:80>/:8080>/' /etc/apache2/sites-enabled/000-default.conf
          exec /entrypoint.sh apache2-foreground
      volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/html

    - name: nginx
      image: docker.io/library/nginx:alpine
      ports:
        - containerPort: 80
          hostPort: 80
      volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true

  volumes:
    - name: nextcloud-data
      persistentVolumeClaim:
        claimName: nextcloud-data
    - name: nginx-conf
      configMap:
        name: nginx-conf
