# Nextcloud + Collabora Office + nginx, served on http://cloud.test:8080
# (see README.md). Bring it up with:  docker compose up -d
#
# nginx listens on :8080 and is published as 8080:8080; Nextcloud and Collabora
# sit behind it and are reached over the shared :8080 URL both from the browser
# and (via the network aliases below) from inside the containers.
services:

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Network aliases make the SAME domains the browser uses also resolve, via
    # Docker's embedded DNS (127.0.0.11), from inside the other containers.
    # This is the piece that makes NC->Collabora and Collabora->NC work.
    # NOTE: the TLD must NOT be .localhost -- glibc hardcodes *.localhost to
    # 127.0.0.1 in getaddrinfo and ignores DNS, so it would loop back to self.
    networks:
      default:
        aliases:
          - cloud.test
          - collabora.test
    depends_on:
      - nextcloud
      - collabora
    restart: always


  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud-frontend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # Unattended first-boot install (SQLite) + admin, so there is no web wizard.
      # SQLITE_DATABASE is REQUIRED to auto-select SQLite on Nextcloud 30+.
      - SQLITE_DATABASE=nextcloud
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      # Register the :8080 host so there is no "untrusted domain" redirect.
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.test:8080 cloud.test
      - OVERWRITEHOST=cloud.test:8080
      - OVERWRITEPROTOCOL=http
      - OVERWRITECLIURL=http://cloud.test:8080
      # Consumed by the before-starting hook to wire up Collabora Office.
      - OFFICE_URL=http://collabora.test:8080
    volumes:
      - nextcloud_data:/var/www/html
      # Auto-install + configure the Nextcloud Office (richdocuments) app.
      - ./hooks/before-starting/office.sh:/docker-entrypoint-hooks.d/before-starting/office.sh:ro
    depends_on:
      - collabora
    restart: always


  collabora:
    image: collabora/code:latest
    container_name: collabora-backend
    environment:
      # cloud.test:8080 is what the browser uses to access Nextcloud (via nginx).
      - aliasgroup1=http://cloud.test:8080
      # server_name tells Collabora its public host:port so the editor URLs in
      # its discovery XML carry :8080 (else the browser is sent to :80 and fails).
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:server_name=collabora.test:8080
    cap_add:
      - SYS_ADMIN
      - MKNOD
    restart: always

volumes:
  nextcloud_data:
