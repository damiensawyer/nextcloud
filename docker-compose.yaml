services:

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Network aliases make the SAME domains the browser uses also resolve, via
    # Docker's embedded DNS (127.0.0.11), from inside the other containers.
    # This is the piece that makes NC->Collabora and Collabora->NC work.
    # NOTE: the TLD must NOT be .localhost -- glibc hardcodes *.localhost to
    # 127.0.0.1 in getaddrinfo and ignores DNS, so it would loop back to self.
    networks:
      default:
        aliases:
          - cloud.test
          - collabora.test
    depends_on:
      - nextcloud
      - collabora
    restart: always


  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud-frontend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - collabora
    restart: always


  collabora:
    image: collabora/code:latest
    container_name: collabora-backend
    environment:
      # cloud.test is what the browser uses to access Nextcloud (via nginx)
      - aliasgroup1=http://cloud.test
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false
    cap_add:
      - SYS_ADMIN
      - MKNOD
    restart: always

volumes:
  nextcloud_data:
