# nginx config for the DOCKER COMPOSE version.
#
# Containers are separate (each on its own Docker network), so nginx reaches them
# by container name. nginx listens on :8080 — the same port that is published to
# the host and that appears in every browser + WOPI URL — so one URL
# (http://cloud.test:8080) works from the browser AND from inside the other
# containers (via the network aliases in docker-compose.yaml). :8080 (>1024) also
# keeps the whole stack rootless- and cross-platform-friendly.
server {
    listen 8080;
    server_name cloud.test;

    client_max_body_size 512M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://nextcloud-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }
}

server {
    listen 8080;
    server_name collabora.test;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://collabora-backend:9980;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}
